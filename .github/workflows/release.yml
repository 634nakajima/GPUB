name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: server

      - name: Build (macOS)
        run: npm run build:mac
        working-directory: server

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            server/dist/GPUB Controller-*.dmg
          draft: false
          prerelease: false

  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: server

      - name: Build (Windows)
        run: npm run build:win
        working-directory: server

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            server/dist/GPUB Controller Setup*.exe
          draft: false
          prerelease: false
